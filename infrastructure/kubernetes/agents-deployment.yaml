apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-agent
  namespace: ai-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-agent
  template:
    metadata:
      labels:
        app: monitoring-agent
    spec:
      containers:
      - name: monitoring-agent
        image: ai-trading/monitoring-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: trading-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-agent
  namespace: ai-trading
spec:
  selector:
    app: monitoring-agent
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
