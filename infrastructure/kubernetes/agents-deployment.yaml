apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-agent
  namespace: ai-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-agent
  template:
    metadata:
      labels:
        app: data-agent
    spec:
      containers:
      - name: data-agent
        image: ai-trading/data-agent:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: trading-config
        - secretRef:
            name: trading-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-agent
  namespace: ai-trading
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analysis-agent
  template:
    metadata:
      labels:
        app: analysis-agent
    spec:
      containers:
      - name: analysis-agent
        image: ai-trading/analysis-agent:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: trading-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
