apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
  namespace: ai-trading
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_HOST: "redis"
  SPRING_PROFILES_ACTIVE: "k8s"
  TRADING_MODE: "paper"
---
apiVersion: v1
kind: Secret
metadata:
  name: trading-secrets
  namespace: ai-trading
type: Opaque
stringData:
  BINANCE_API_KEY: ""
  BINANCE_API_SECRET: ""
  OPENAI_API_KEY: ""
  POSTGRES_PASSWORD: "trading_pass_k8s"
